<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Cat Litter Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 20px 16px 8px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e0e0e0;
    }

    .date-label {
      font-size: 0.85rem;
      color: #888;
      margin-top: 4px;
    }

    .buttons-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px;
      justify-content: center;
      min-height: 0;
    }

    .litter-btn {
      position: relative;
      border: none;
      border-radius: 20px;
      padding: 24px 20px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }

    .litter-btn:active {
      transform: scale(0.97);
    }

    .litter-btn .info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .litter-btn .location {
      font-size: 1.15rem;
    }

    .litter-btn .sand-status {
      font-size: 0.7rem;
      opacity: 0.8;
      font-weight: 400;
    }

    .litter-btn .sand-status.due {
      opacity: 1;
      font-weight: 700;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .litter-btn .count {
      font-size: 2.8rem;
      font-weight: 800;
      min-width: 50px;
      text-align: center;
      line-height: 1;
    }

    .btn-kitchen { background: linear-gradient(135deg, #e67e22, #d35400); }
    .btn-living { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .btn-bathroom { background: linear-gradient(135deg, #3498db, #2980b9); }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px calc(env(safe-area-inset-bottom, 8px) + 12px);
      gap: 10px;
      flex-shrink: 0;
    }

    .bottom-bar button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #aaa;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.8rem;
      cursor: pointer;
      flex: 1;
      font-weight: 500;
    }

    .bottom-bar button:active {
      background: rgba(255,255,255,0.15);
    }

    /* Sand change modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #2a2a4a;
      border-radius: 20px;
      padding: 24px;
      max-width: 360px;
      width: 100%;
    }

    .modal h2 {
      font-size: 1.1rem;
      margin-bottom: 16px;
      text-align: center;
    }

    .modal .sand-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .modal .sand-item:last-child { border-bottom: none; }

    .modal .sand-item .sand-label {
      font-size: 0.9rem;
    }

    .modal .sand-item .sand-days {
      font-size: 0.75rem;
      color: #888;
      margin-top: 2px;
    }

    .modal .sand-item .sand-days.overdue {
      color: #e74c3c;
      font-weight: 600;
    }

    .sand-reset-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .sand-reset-btn:active { background: rgba(255,255,255,0.2); }

    .modal-close {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      border-radius: 12px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    /* History modal */
    .history-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .history-day {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.85rem;
    }

    .history-day .history-date {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .history-day .history-counts {
      color: #999;
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .no-history {
      text-align: center;
      color: #666;
      padding: 20px 0;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🐱 Cat Litter Tracker</h1>
  <div class="date-label" id="dateLabel"></div>
</header>

<div class="buttons-container">
  <button class="litter-btn btn-kitchen" onclick="increment('kitchen')">
    <div class="info">
      <span class="location">🍳 Kitchen</span>
      <span class="sand-status" id="sand-kitchen"></span>
    </div>
    <span class="count" id="count-kitchen">0</span>
  </button>

  <button class="litter-btn btn-living" onclick="increment('living')">
    <div class="info">
      <span class="location">🛋️ Living Room</span>
      <span class="sand-status" id="sand-living"></span>
    </div>
    <span class="count" id="count-living">0</span>
  </button>

  <button class="litter-btn btn-bathroom" onclick="increment('bathroom')">
    <div class="info">
      <span class="location">🚿 Small Bathroom</span>
      <span class="sand-status" id="sand-bathroom"></span>
    </div>
    <span class="count" id="count-bathroom">0</span>
  </button>
</div>

<div class="bottom-bar">
  <button onclick="undoLast()">↩ Undo</button>
  <button onclick="showSandModal()">🪣 Sand</button>
  <button onclick="showHistoryModal()">📊 History</button>
</div>

<!-- Sand Change Modal -->
<div class="modal-overlay" id="sandModal">
  <div class="modal">
    <h2>🪣 Sand Changes</h2>
    <div id="sandList"></div>
    <button class="modal-close" onclick="closeSandModal()">Close</button>
  </div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <h2>📊 History</h2>
    <div class="history-list" id="historyList"></div>
    <button class="modal-close" onclick="closeHistoryModal()">Close</button>
  </div>
</div>

<script>
const LITTERS = ['kitchen', 'living', 'bathroom'];
const LITTER_NAMES = { kitchen: 'Kitchen', living: 'Living Room', bathroom: 'Small Bathroom' };
const SAND_CYCLE_DAYS = 9;

let undoStack = [];

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function getData() {
  return JSON.parse(localStorage.getItem('catLitterData') || '{}');
}

function saveData(data) {
  localStorage.setItem('catLitterData', JSON.stringify(data));
}

function getSandData() {
  return JSON.parse(localStorage.getItem('catSandData') || '{}');
}

function saveSandData(data) {
  localStorage.setItem('catSandData', JSON.stringify(data));
}

function getTodayCounts() {
  const data = getData();
  const today = todayKey();
  if (!data[today]) data[today] = { kitchen: 0, living: 0, bathroom: 0 };
  return data;
}

function render() {
  const data = getTodayCounts();
  const today = todayKey();

  document.getElementById('dateLabel').textContent = formatDate(today);

  LITTERS.forEach(id => {
    document.getElementById(`count-${id}`).textContent = data[today][id] || 0;
  });

  renderSandStatus();
}

function increment(litterId) {
  const data = getTodayCounts();
  const today = todayKey();
  data[today][litterId] = (data[today][litterId] || 0) + 1;
  saveData(data);
  undoStack.push({ date: today, litter: litterId });

  const countEl = document.getElementById(`count-${litterId}`);
  countEl.textContent = data[today][litterId];

  // Quick pop animation
  countEl.style.transform = 'scale(1.3)';
  setTimeout(() => countEl.style.transform = 'scale(1)', 150);
}

function undoLast() {
  if (undoStack.length === 0) return;
  const last = undoStack.pop();
  const data = getData();
  if (data[last.date] && data[last.date][last.litter] > 0) {
    data[last.date][last.litter]--;
    saveData(data);
    render();
  }
}

// Sand tracking
function initSandData() {
  const sand = getSandData();
  const today = todayKey();
  LITTERS.forEach(id => {
    if (!sand[id]) sand[id] = today;
  });
  saveSandData(sand);
}

function daysSinceSandChange(litterId) {
  const sand = getSandData();
  if (!sand[litterId]) return 0;
  const last = new Date(sand[litterId] + 'T12:00:00');
  const now = new Date(todayKey() + 'T12:00:00');
  return Math.floor((now - last) / (1000 * 60 * 60 * 24));
}

function renderSandStatus() {
  LITTERS.forEach(id => {
    const days = daysSinceSandChange(id);
    const el = document.getElementById(`sand-${id}`);
    const remaining = SAND_CYCLE_DAYS - days;

    if (remaining <= 0) {
      el.textContent = `⚠️ Sand change overdue!`;
      el.classList.add('due');
    } else if (remaining <= 2) {
      el.textContent = `⏰ Change sand in ${remaining} day${remaining > 1 ? 's' : ''}`;
      el.classList.add('due');
    } else {
      el.textContent = `Sand changed ${days}d ago`;
      el.classList.remove('due');
    }
  });
}

function resetSand(litterId) {
  const sand = getSandData();
  sand[litterId] = todayKey();
  saveSandData(sand);
  renderSandStatus();
  showSandModal(); // Re-render modal
}

function showSandModal() {
  const container = document.getElementById('sandList');
  container.innerHTML = '';
  LITTERS.forEach(id => {
    const days = daysSinceSandChange(id);
    const remaining = SAND_CYCLE_DAYS - days;
    const overdue = remaining <= 0;

    container.innerHTML += `
      <div class="sand-item">
        <div>
          <div class="sand-label">${LITTER_NAMES[id]}</div>
          <div class="sand-days ${overdue ? 'overdue' : ''}">
            ${overdue ? `Overdue by ${Math.abs(remaining)} day(s)!` : `${days} day(s) ago — ${remaining} left`}
          </div>
        </div>
        <button class="sand-reset-btn" onclick="resetSand('${id}')">Changed ✓</button>
      </div>`;
  });
  document.getElementById('sandModal').classList.add('active');
}

function closeSandModal() {
  document.getElementById('sandModal').classList.remove('active');
}

// History
function showHistoryModal() {
  const data = getData();
  const days = Object.keys(data).sort().reverse().slice(0, 14);
  const container = document.getElementById('historyList');

  if (days.length === 0) {
    container.innerHTML = '<div class="no-history">No data yet</div>';
  } else {
    container.innerHTML = days.map(day => {
      const d = data[day];
      const total = (d.kitchen || 0) + (d.living || 0) + (d.bathroom || 0);
      return `<div class="history-day">
        <div class="history-date">${formatDate(day)} ${day === todayKey() ? '(Today)' : ''}</div>
        <div class="history-counts">
          🍳 Kitchen: ${d.kitchen || 0} · 🛋️ Living: ${d.living || 0} · 🚿 Bathroom: ${d.bathroom || 0} · Total: ${total}
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('historyModal').classList.add('active');
}

function closeHistoryModal() {
  document.getElementById('historyModal').classList.remove('active');
}

// Notifications
async function requestNotifications() {
  if ('Notification' in window && Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}

function checkSandReminders() {
  if ('Notification' in window && Notification.permission === 'granted') {
    LITTERS.forEach(id => {
      const remaining = SAND_CYCLE_DAYS - daysSinceSandChange(id);
      if (remaining <= 0) {
        new Notification('🐱 Cat Litter Reminder', {
          body: `${LITTER_NAMES[id]} sand is overdue for a change!`,
          icon: '🐱',
          tag: `sand-${id}`
        });
      }
    });
  }
}

// Init
initSandData();
render();
requestNotifications();
checkSandReminders();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

// Check for day change if app stays open
setInterval(() => {
  render();
  checkSandReminders();
}, 60000);
</script>

</body>
</html>
